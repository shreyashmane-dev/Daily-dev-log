name: Auto Daily Log Update

on:
  schedule:
    - cron: '0 18 * * *'   # Runs daily at 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Daily Log
        run: |
          python scripts/generate_daily_log.py

      - name: Commit and Push Changes
        run: |
          git config user.name "shreyashmane-dev"
          git config user.email "anosvoldigoadw1@gmail.com"

          git add logs/

          if ! git diff --staged --quiet; then
            git commit -m "chore: update daily dev log"
            git push origin main
          else
            echo "No changes to commit"
          fi
